# ─────────────────────────────────────────
# Central configuration — config.yaml
# ─────────────────────────────────────────

# ── Data paths ─────────────────────────────────────────────────────────────────
data:
  train:      data/Train.csv
  val:        data/Val.csv
  test:       data/Test.csv
  submission: data/SampleSubmission.csv

# Column names in the CSVs
columns:
  id:       ID
  question: input
  answer:   output
  subset:   subset          # encodes language+country, e.g. "Aka_Gha"

# ── Language mapping ────────────────────────────────────────────────────────────
language_map:
  Aka: akan
  Amh: amharic
  Lug: luganda
  Swa: swahili
  Eng: english

langdetect_map:
  ak: akan
  am: amharic
  lg: luganda
  sw: swahili
  en: english

# ── Model ───────────────────────────────────────────────────────────────────────
model:
  # Primary model — change name here to switch architectures.
  # Model type (mt5 | nllb) is auto-detected from the name; set `type` to override.
  name: bigscience/mt0-large
  # Alternatives:
  #   google/mt5-large                  — raw mT5 (previous baseline)
  #   facebook/nllb-200-1.3B            — best for low-resource African languages
  #   facebook/nllb-200-distilled-600M  — faster NLLB variant (~half the size)
  #   google/mt5-xl                     — largest mT5; needs 4× memory of mt5-large
  # type: nllb                          — uncomment only if auto-detection fails

  input_max_len:  256
  target_max_len: 512

  # NLLB language codes — used when model type is nllb
  nllb_language_map:
    akan:     aka_Latn
    amharic:  amh_Ethi
    luganda:  lug_Latn
    swahili:  swh_Latn
    english:  eng_Latn

# ── Training ────────────────────────────────────────────────────────────────────
training:
  output_dir:                 /data/user_data/jgibson2/multilqa_output/baseline/checkpoints
  final_model_dir:            /data/user_data/jgibson2/multilqa_output/baseline/final_model
  num_train_epochs:           10
  per_device_train_batch_size: 8        # halved for mt5-large; effective batch = 8 x grad_accum 4 = 32
  per_device_eval_batch_size:  16
  gradient_accumulation_steps: 4
  gradient_checkpointing:      true
  learning_rate:              5.0e-4
  optim:                      adafactor
  predict_with_generate:      true
  generation_max_length:      128       # used during training eval; keep ≥ half of inference max_new_tokens
  eval_strategy:              epoch
  save_strategy:              epoch
  load_best_model_at_end:     true
  metric_for_best_model:      rougeL
  fp16:                       false     # mT5 overflows fp16; use bf16 instead
  bf16:                       true
  weight_decay:               0.0
  warmup_ratio:               0.03
  label_smoothing_factor:     0.0
  logging_steps:              100
  save_total_limit:           3         # keep 3 checkpoints so ensemble.py has enough to pick from
  report_to:                  none
  dataloader_num_workers:     0
  balanced_sampling:          true
  balance_alpha:              1.0
  seed:                       42
  metrics_out:                /data/user_data/jgibson2/multilqa_output/baseline/train_metrics.json
  debug_train_rows:           500
  debug_val_rows:             100

# ── Hyperparameter tuning ──────────────────────────────────────────────────────
tuning:
  trials: 8
  trial_epochs: 2
  trial_seed: 42
  learning_rates: [3.0e-4, 4.0e-4, 5.0e-4, 6.0e-4]
  weight_decays: [0.0, 0.01]
  warmup_ratios: [0.03, 0.06, 0.1]
  label_smoothing_factors: [0.0]
  generation_max_lengths: [128, 192]
  gradient_accumulation_steps: [2, 4]
  balanced_sampling_options: [false, true]
  balance_alphas: [0.7, 1.0, 1.3]

# ── Inference ───────────────────────────────────────────────────────────────────
inference:
  batch_size:           32
  num_beams:            8
  max_new_tokens:       384
  no_repeat_ngram_size: 3
  length_penalty:       1.0
  early_stopping:       true
  output_file:          /data/user_data/jgibson2/multilqa_output/baseline/submission.csv
  val_output_file:      /data/user_data/jgibson2/multilqa_output/baseline/val_predictions.csv

# ── Ensemble ────────────────────────────────────────────────────────────────────
ensemble:
  output_dir: /data/user_data/jgibson2/multilqa_output/baseline/ensemble_model
  top_k:      3             # number of best checkpoints to weight-average
  metric:     eval_rougeL   # trainer metric used to rank checkpoints

# ── Evaluation ──────────────────────────────────────────────────────────────────
evaluation:
  output_file:   /data/user_data/jgibson2/multilqa_output/baseline/eval_results.json
  weight_rouge1: 0.37
  weight_rougeL: 0.37
  weight_llm:    0.26

# ── Retrieval ───────────────────────────────────────────────────────────────────
retrieval:
  semantic_model:       sentence-transformers/LaBSE   # 109-language model; much better for Amharic/Akan
  similarity_threshold: 0.82   # global fallback; overridden per-language by tune_retrieval output
  top_k:                3      # retrieve top-k neighbours; return the longest above-threshold answer
  encode_batch_size:    256
  thresholds_file:      /data/user_data/jgibson2/multilqa_output/baseline/retrieval_thresholds.json

# ── EDA ─────────────────────────────────────────────────────────────────────────
eda:
  lang_sample_size: 200
  report_file:      output/eda_report.txt
  plot_file:        output/answer_length_dist.png
